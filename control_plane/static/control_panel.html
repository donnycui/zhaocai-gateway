<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>招财网关控制面板 | Zhaocai Control Plane</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --line: #dbe5f0;
      --text: #0b1220;
      --muted: #516175;
      --brand: #2563eb;
      --ok: #166534;
      --bad: #991b1b;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, #f8fafc 0%, #eff6ff 50%, #eef2ff 100%);
    }
    .container {
      max-width: 1100px;
      margin: 24px auto 48px;
      padding: 0 16px;
      display: grid;
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 8px 18px rgba(11, 18, 32, 0.04);
    }
    h1, h2 {
      margin: 0 0 10px 0;
      font-weight: 650;
    }
    h1 { font-size: 22px; }
    h2 { font-size: 17px; }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
    }
    textarea {
      min-height: 80px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    button {
      cursor: pointer;
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      font-weight: 600;
    }
    button.secondary {
      background: var(--card);
      color: var(--brand);
    }
    .inline {
      display: flex;
      gap: 8px;
    }
    .inline > * {
      flex: 1;
    }
    pre {
      margin: 0;
      background: #0f172a;
      color: #cbd5e1;
      border-radius: 8px;
      padding: 10px;
      overflow: auto;
      font-size: 12px;
      min-height: 100px;
    }
    .status {
      font-size: 13px;
      margin-top: 6px;
    }
    .status.ok { color: var(--ok); }
    .status.bad { color: var(--bad); }
    .lang-switch {
      position: absolute;
      top: 20px;
      right: 20px;
    }
    .lang-switch button {
      width: auto;
      padding: 6px 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="lang-switch">
    <button class="secondary" onclick="toggleLang()" id="langBtn">English</button>
  </div>

  <div class="container">
    <div class="card">
      <h1 data-i18n="title">招财网关控制面板</h1>
      <div class="muted" data-i18n="subtitle">管理 Provider、模型、配置集和节点。管理接口请求头: <code>X-Admin-Token</code></div>
      <div class="inline" style="margin-top:10px;">
        <input id="adminToken" data-i18n-placeholder="adminTokenPlaceholder" placeholder="输入管理员 Token">
        <button onclick="refreshAll()" data-i18n="refreshBtn">刷新全部</button>
      </div>
      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <h2 data-i18n="createProvider">创建 Provider</h2>
      <div class="grid">
        <input id="providerName" data-i18n-placeholder="providerName" placeholder="名称 (如: openai-main)">
        <input id="providerType" data-i18n-placeholder="providerType" placeholder="类型 (openai/anthropic)" value="openai">
        <input id="providerBaseUrl" data-i18n-placeholder="providerBaseUrl" placeholder="基础 URL">
        <input id="providerAuth" data-i18n-placeholder="providerAuth" placeholder="认证方式 (bearer/x-api-key)" value="bearer">
        <input id="providerApiKey" data-i18n-placeholder="providerApiKey" placeholder="API 密钥">
        <input id="providerSecretRef" data-i18n-placeholder="providerSecretRef" placeholder="密钥引用 (可选)">
      </div>
      <textarea id="providerHeaders" data-i18n-placeholder="providerHeaders" placeholder='额外请求头 JSON, 如 {"anthropic-version":"2023-06-01"}'></textarea>
      <button onclick="createProvider()" data-i18n="createProviderBtn">创建 Provider</button>
    </div>

    <div class="card">
      <h2 data-i18n="createModel">创建 Model</h2>
      <div class="grid">
        <input id="modelProviderId" data-i18n-placeholder="modelProviderId" placeholder="Provider ID">
        <input id="modelUpstream" data-i18n-placeholder="modelUpstream" placeholder="上游模型名称">
        <input id="modelAlias" data-i18n-placeholder="modelAlias" placeholder="别名 (节点使用)">
      </div>
      <textarea id="modelCaps" data-i18n-placeholder="modelCaps" placeholder='能力标签 JSON 数组, 如 ["chat","reasoning"]'></textarea>
      <button onclick="createModel()" data-i18n="createModelBtn">创建 Model</button>
    </div>

    <div class="card">
      <h2 data-i18n="createProfile">创建配置集与绑定</h2>
      <div class="inline">
        <input id="profileName" data-i18n-placeholder="profileName" placeholder="配置集名称">
        <input id="profileDesc" data-i18n-placeholder="profileDesc" placeholder="描述">
      </div>
      <button onclick="createProfile()" data-i18n="createProfileBtn">创建配置集</button>
      <div class="inline" style="margin-top:8px;">
        <input id="bindProfileId" data-i18n-placeholder="bindProfileId" placeholder="配置集 ID">
        <input id="bindModelIds" data-i18n-placeholder="bindModelIds" placeholder="模型 IDs (逗号分隔)">
      </div>
      <button onclick="setBindings()" data-i18n="setBindingsBtn">设置绑定</button>
    </div>

    <div class="card">
      <h2 data-i18n="createNode">创建节点与拉取配置</h2>
      <div class="inline">
        <input id="nodeName" data-i18n-placeholder="nodeName" placeholder="节点名称">
        <input id="nodeProfileId" data-i18n-placeholder="nodeProfileId" placeholder="配置集 ID">
      </div>
      <button onclick="createNode()" data-i18n="createNodeBtn">创建节点</button>
      <div class="inline" style="margin-top:8px;">
        <input id="pullNodeId" data-i18n-placeholder="pullNodeId" placeholder="节点 ID">
        <input id="pullToken" data-i18n-placeholder="pullToken" placeholder="拉取 Token (或使用管理员 Token)">
      </div>
      <button onclick="pullNodeConfig()" data-i18n="pullConfigBtn">获取 openclaw.json</button>
    </div>

    <div class="card">
      <h2 data-i18n="dataSnapshot">数据快照</h2>
      <div class="grid">
        <div><div class="muted" data-i18n="providers">Providers</div><pre id="providersOut"></pre></div>
        <div><div class="muted" data-i18n="models">Models</div><pre id="modelsOut"></pre></div>
        <div><div class="muted" data-i18n="profiles">配置集</div><pre id="profilesOut"></pre></div>
        <div><div class="muted" data-i18n="nodes">节点</div><pre id="nodesOut"></pre></div>
      </div>
      <div class="muted" style="margin-top:10px;" data-i18n="lastConfig">上次拉取的节点配置</div>
      <pre id="nodeConfigOut"></pre>
    </div>
  </div>

  <script>
    // 国际化翻译
    const i18n = {
      zh: {
        title: "招财网关控制面板",
        subtitle: "管理 Provider、模型、配置集和节点。管理接口请求头: <code>X-Admin-Token</code>",
        adminTokenPlaceholder: "输入管理员 Token",
        refreshBtn: "刷新全部",
        createProvider: "创建 Provider",
        providerName: "名称 (如: openai-main)",
        providerType: "类型 (openai/anthropic)",
        providerBaseUrl: "基础 URL",
        providerAuth: "认证方式 (bearer/x-api-key)",
        providerApiKey: "API 密钥",
        providerSecretRef: "密钥引用 (可选)",
        providerHeaders: "额外请求头 JSON, 如 {\"anthropic-version\":\"2023-06-01\"}",
        createProviderBtn: "创建 Provider",
        createModel: "创建 Model",
        modelProviderId: "Provider ID",
        modelUpstream: "上游模型名称",
        modelAlias: "别名 (节点使用)",
        modelCaps: "能力标签 JSON 数组, 如 [\"chat\",\"reasoning\"]",
        createModelBtn: "创建 Model",
        createProfile: "创建配置集与绑定",
        profileName: "配置集名称",
        profileDesc: "描述",
        createProfileBtn: "创建配置集",
        bindProfileId: "配置集 ID",
        bindModelIds: "模型 IDs (逗号分隔)",
        setBindingsBtn: "设置绑定",
        createNode: "创建节点与拉取配置",
        nodeName: "节点名称",
        nodeProfileId: "配置集 ID",
        createNodeBtn: "创建节点",
        pullNodeId: "节点 ID",
        pullToken: "拉取 Token (或使用管理员 Token)",
        pullConfigBtn: "获取 openclaw.json",
        dataSnapshot: "数据快照",
        providers: "Providers",
        models: "Models",
        profiles: "配置集",
        nodes: "节点",
        lastConfig: "上次拉取的节点配置",
        statusOk: "成功",
        statusFailed: "失败",
        providerCreated: "Provider 创建成功",
        modelCreated: "Model 创建成功",
        profileCreated: "配置集创建成功",
        bindingsUpdated: "绑定已更新",
        nodeCreated: "节点创建成功",
        configPulled: "配置已拉取",
        refreshed: "已刷新"
      },
      en: {
        title: "Zhaocai Control Plane",
        subtitle: "Manage providers, models, profiles, and nodes. Header for admin APIs: <code>X-Admin-Token</code>",
        adminTokenPlaceholder: "Admin token",
        refreshBtn: "Refresh All",
        createProvider: "Create Provider",
        providerName: "name (e.g. openai-main)",
        providerType: "provider_type (openai/anthropic)",
        providerBaseUrl: "base_url",
        providerAuth: "auth_scheme (bearer/x-api-key)",
        providerApiKey: "api_key",
        providerSecretRef: "secret_ref (optional)",
        providerHeaders: "extra_headers JSON, e.g. {\"anthropic-version\":\"2023-06-01\"}",
        createProviderBtn: "Create Provider",
        createModel: "Create Model",
        modelProviderId: "provider_id",
        modelUpstream: "upstream_model",
        modelAlias: "alias (used by nodes)",
        modelCaps: "capabilities JSON array, e.g. [\"chat\",\"reasoning\"]",
        createModelBtn: "Create Model",
        createProfile: "Create Profile And Bindings",
        profileName: "profile name",
        profileDesc: "description",
        createProfileBtn: "Create Profile",
        bindProfileId: "profile_id",
        bindModelIds: "model_ids comma-separated",
        setBindingsBtn: "Set Bindings",
        createNode: "Create Node And Pull Config",
        nodeName: "node name",
        nodeProfileId: "profile_id",
        createNodeBtn: "Create Node",
        pullNodeId: "node_id",
        pullToken: "pull token (or use admin token)",
        pullConfigBtn: "Get openclaw.json",
        dataSnapshot: "Data Snapshot",
        providers: "Providers",
        models: "Models",
        profiles: "Profiles",
        nodes: "Nodes",
        lastConfig: "Last pulled node config",
        statusOk: "Success",
        statusFailed: "Failed",
        providerCreated: "Provider created",
        modelCreated: "Model created",
        profileCreated: "Profile created",
        bindingsUpdated: "Bindings updated",
        nodeCreated: "Node created",
        configPulled: "Config pulled",
        refreshed: "Refreshed"
      }
    };

    let currentLang = 'zh';

    function toggleLang() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      document.getElementById('langBtn').textContent = currentLang === 'zh' ? 'English' : '中文';
      applyLanguage();
    }

    function applyLanguage() {
      const t = i18n[currentLang];

      // 应用所有 data-i18n 属性
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.innerHTML = t[key];
      });

      // 应用所有 data-i18n-placeholder 属性
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (t[key]) el.placeholder = t[key];
      });

      // 更新页面标题
      document.title = t.title;
    }

    function setStatus(msg, ok = true) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = "status " + (ok ? "ok" : "bad");
    }

    function adminHeaders() {
      const token = document.getElementById("adminToken").value.trim();
      return {"X-Admin-Token": token, "Content-Type": "application/json"};
    }

    async function api(method, path, body = null, headers = null) {
      const res = await fetch(path, {
        method,
        headers: headers || adminHeaders(),
        body: body ? JSON.stringify(body) : null
      });
      const text = await res.text();
      let payload = null;
      try { payload = text ? JSON.parse(text) : null; } catch (_) { payload = text; }
      if (!res.ok && res.status !== 304) {
        throw new Error((payload && payload.detail) ? payload.detail : (typeof payload === "string" ? payload : res.status));
      }
      return {status: res.status, payload, headers: res.headers};
    }

    function parseJsonInput(id, fallback) {
      const raw = document.getElementById(id).value.trim();
      if (!raw) return fallback;
      return JSON.parse(raw);
    }

    async function createProvider() {
      try {
        const body = {
          name: document.getElementById("providerName").value.trim(),
          provider_type: document.getElementById("providerType").value.trim(),
          base_url: document.getElementById("providerBaseUrl").value.trim(),
          auth_scheme: document.getElementById("providerAuth").value.trim(),
          api_key: document.getElementById("providerApiKey").value.trim(),
          secret_ref: document.getElementById("providerSecretRef").value.trim(),
          extra_headers: parseJsonInput("providerHeaders", {})
        };
        await api("POST", "/control/v1/providers", body);
        setStatus(i18n[currentLang].providerCreated);
        await refreshAll();
      } catch (err) {
        setStatus(i18n[currentLang].statusFailed + ": " + err.message, false);
      }
    }

    async function createModel() {
      try {
        const body = {
          provider_id: Number(document.getElementById("modelProviderId").value.trim()),
          upstream_model: document.getElementById("modelUpstream").value.trim(),
          alias: document.getElementById("modelAlias").value.trim(),
          capabilities: parseJsonInput("modelCaps", [])
        };
        await api("POST", "/control/v1/models", body);
        setStatus(i18n[currentLang].modelCreated);
        await refreshAll();
      } catch (err) {
        setStatus(i18n[currentLang].statusFailed + ": " + err.message, false);
      }
    }

    async function createProfile() {
      try {
        const body = {
          name: document.getElementById("profileName").value.trim(),
          description: document.getElementById("profileDesc").value.trim()
        };
        await api("POST", "/control/v1/profiles", body);
        setStatus(i18n[currentLang].profileCreated);
        await refreshAll();
      } catch (err) {
        setStatus(i18n[currentLang].statusFailed + ": " + err.message, false);
      }
    }

    async function setBindings() {
      try {
        const profileId = Number(document.getElementById("bindProfileId").value.trim());
        const modelIds = document.getElementById("bindModelIds").value
          .split(",")
          .map(v => Number(v.trim()))
          .filter(v => Number.isFinite(v));
        await api("POST", `/control/v1/profiles/${profileId}/bindings`, {model_ids: modelIds});
        setStatus(i18n[currentLang].bindingsUpdated);
        await refreshAll();
      } catch (err) {
        setStatus(i18n[currentLang].statusFailed + ": " + err.message, false);
      }
    }

    async function createNode() {
      try {
        const body = {
          name: document.getElementById("nodeName").value.trim(),
          profile_id: Number(document.getElementById("nodeProfileId").value.trim()),
          sync_mode: "pull",
          active: true
        };
        const result = await api("POST", "/control/v1/nodes", body);
        setStatus(i18n[currentLang].nodeCreated);
        document.getElementById("nodesOut").textContent = JSON.stringify(result.payload, null, 2);
        await refreshAll();
      } catch (err) {
        setStatus(i18n[currentLang].statusFailed + ": " + err.message, false);
      }
    }

    async function pullNodeConfig() {
      try {
        const nodeId = Number(document.getElementById("pullNodeId").value.trim());
        const pullToken = document.getElementById("pullToken").value.trim();
        const headers = pullToken
          ? {"Authorization": `Bearer ${pullToken}`}
          : adminHeaders();
        const result = await api("GET", `/control/v1/nodes/${nodeId}/openclaw-json`, null, headers);
        document.getElementById("nodeConfigOut").textContent = JSON.stringify(result.payload, null, 2);
        setStatus(`${i18n[currentLang].configPulled}. ETag=${result.headers.get("etag") || ""}`);
      } catch (err) {
        setStatus(i18n[currentLang].statusFailed + ": " + err.message, false);
      }
    }

    async function refreshAll() {
      try {
        const [providers, models, profiles, nodes] = await Promise.all([
          api("GET", "/control/v1/providers"),
          api("GET", "/control/v1/models"),
          api("GET", "/control/v1/profiles"),
          api("GET", "/control/v1/nodes")
        ]);
        document.getElementById("providersOut").textContent = JSON.stringify(providers.payload, null, 2);
        document.getElementById("modelsOut").textContent = JSON.stringify(models.payload, null, 2);
        document.getElementById("profilesOut").textContent = JSON.stringify(profiles.payload, null, 2);
        document.getElementById("nodesOut").textContent = JSON.stringify(nodes.payload, null, 2);
        setStatus(i18n[currentLang].refreshed);
      } catch (err) {
        setStatus(i18n[currentLang].statusFailed + ": " + err.message, false);
      }
    }

    // 初始化语言
    applyLanguage();
  </script>
</body>
</html>
